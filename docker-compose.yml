services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: recommendation-backend
    ports:
      - "80:80"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: recommendation-frontend
    environment:
      BACKEND_URL: http://backend:80
    ports:
      - "8501:8501"
    depends_on:
      - backend
